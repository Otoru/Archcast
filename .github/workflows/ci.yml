name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  # Gate: skip the rest of the pipeline when the commit was made by a bot,
  # so a job that commits back to main (if one is ever added) can't loop.
  check-commit:
    name: Check Commit Source
    runs-on: ubuntu-latest
    permissions: {}
    if: always()
    outputs:
      should-run: ${{ steps.check.outputs.should-run || steps.check-pr.outputs.should-run }}
    steps:
      - name: Check if commit is from bot
        id: check
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should-run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$COMMIT_AUTHOR" == "github-actions[bot]" ]] || \
             [[ "$COMMIT_MSG" == *":pencil: (docs) update contributors"* ]] || \
             [[ "$COMMIT_MSG" == *"update contributors"* ]]; then
            echo "should-run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping workflow - commit was made by bot"
            exit 0
          else
            echo "should-run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set default for PRs
        id: check-pr
        if: github.event_name == 'pull_request'
        run: |
          echo "should-run=true" >> "$GITHUB_OUTPUT"

  # Lint, tests (with coverage) and build.
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: check-commit
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && needs.check-commit.outputs.should-run == 'true') ||
      (github.event_name == 'workflow_dispatch' && needs.check-commit.outputs.should-run == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Lint
        run: pnpm lint

      - name: Test (with coverage)
        run: pnpm test:run --coverage

      - name: Build
        run: pnpm build

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn
          retention-days: 3

  # SonarCloud analysis. Fails the job if the quality gate fails.
  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    needs: [check-commit, test]
    if: |
      needs.check-commit.outputs.should-run == 'true' &&
      (github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-lcov
          path: coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true