name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen instead.
      placeholder: "When I … I expected … but got …"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: A minimal, reproducible sequence.
      placeholder: |
        1. Open the editor
        2. Drag an app-server block
        3. …
    validations:
      required: true
  - type: textarea
    id: verdict
    attributes:
      label: Verdict / output
      description: If relevant, paste the Verdict panel output or the console error.
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / recording
      description: Drag in an image or GIF of the canvas.
    validations:
      required: false
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15, Ubuntu 24.04, Windows 11"
    validations:
      required: false
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "20.x"
    validations:
      required: false
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: "Chrome 130, Firefox 131"
    validations:
      required: false